<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doma — Jósean Log</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#000;
  font-family:'Playfair Display', serif;
  height:100vh;
  color:white;
}

/* =========================
   BACKGROUND
========================= */

#bg{
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 20%, rgba(168,85,247,.18), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(249,168,212,.15), transparent 35%),
    radial-gradient(circle at center, rgba(255,255,255,.03), transparent 70%);

  animation:bgPulse 8s ease-in-out infinite;
}

@keyframes bgPulse{

  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.04);
  }
}

/* =========================
   STARS
========================= */

.star{

  position:absolute;

  width:2px;
  height:2px;

  border-radius:50%;

  background:white;

  opacity:.2;

  animation:twinkle linear infinite;
}

@keyframes twinkle{

  0%,100%{
    opacity:.1;
  }

  50%{
    opacity:.9;
  }
}

/* =========================
   INTRO
========================= */

#intro{

  position:absolute;
  inset:0;

  display:flex;
  flex-direction:column;

  align-items:center;
  justify-content:center;

  z-index:5;

  animation:fadeIn 1.2s ease;
}

#intro h1{

  font-family:'Great Vibes',cursive;

  font-size:clamp(5rem,13vw,11rem);

  color:#f9a8d4;

  text-shadow:
    0 0 10px #fff,
    0 0 30px #f9a8d4,
    0 0 60px #a855f7;
}

#intro p{

  margin-top:12px;

  opacity:.6;

  letter-spacing:.4em;
}

#startBtn{

  margin-top:35px;

  padding:15px 45px;

  border:none;

  border-radius:999px;

  background:rgba(168,85,247,.15);

  color:white;

  cursor:pointer;

  font-size:1rem;

  border:1px solid rgba(255,255,255,.15);

  backdrop-filter:blur(10px);

  transition:.35s;
}

#startBtn:hover{

  transform:scale(1.05);

  box-shadow:
    0 0 25px rgba(168,85,247,.6),
    0 0 50px rgba(249,168,212,.45);
}

/* =========================
   STAGE
========================= */

#stage{

  position:absolute;
  inset:0;

  display:none;

  justify-content:center;
  align-items:center;
  flex-direction:column;

  padding:20px;

  z-index:5;
}

/* =========================
   LYRICS
========================= */

#line{

  max-width:1100px;

  text-align:center;

  line-height:1.35;

  font-size:clamp(2rem,5vw,4.3rem);

  font-weight:700;

  opacity:0;

  transform:
    translateY(25px)
    scale(.98);

  filter:blur(10px);

  transition:
    opacity .7s ease,
    transform .7s ease,
    filter .7s ease;
}

#line.active{

  opacity:1;

  transform:
    translateY(0)
    scale(1);

  filter:blur(0);
}

.char{

  color:rgba(255,255,255,.08);

  transition:
    color .18s ease,
    text-shadow .18s ease,
    filter .18s ease;
}

.char.on{

  color:white;

  filter:blur(.2px);

  text-shadow:
    0 0 5px #fff,
    0 0 15px #d8b4fe,
    0 0 30px #a855f7,
    0 0 60px rgba(168,85,247,.65);
}

/* =========================
   NEXT
========================= */

#next{

  position:absolute;

  bottom:95px;

  opacity:.25;

  font-style:italic;

  letter-spacing:.08em;

  font-size:1rem;
}

/* =========================
   PROGRESS
========================= */

#progressWrap{

  position:fixed;

  left:0;
  bottom:0;

  width:100%;
  height:4px;

  background:rgba(255,255,255,.08);

  z-index:50;
}

#progress{

  width:0%;
  height:100%;

  background:
    linear-gradient(
      90deg,
      #a855f7,
      #f9a8d4
    );

  box-shadow:
    0 0 10px #a855f7,
    0 0 20px #f9a8d4;
}

/* =========================
   NOTES
========================= */

.note{

  position:absolute;

  color:rgba(255,255,255,.2);

  pointer-events:none;

  animation:float 5s linear forwards;
}

@keyframes float{

  0%{
    transform:
      translateY(0)
      rotate(0deg);

    opacity:0;
  }

  15%{
    opacity:.45;
  }

  100%{
    transform:
      translateY(-240px)
      rotate(18deg);

    opacity:0;
  }
}

/* =========================
   FADE
========================= */

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(20px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

/* =========================
   ELEMENTS
========================= */

const audio=document.getElementById('audio');

const line=document.getElementById('line');

const next=document.getElementById('next');

const progress=document.getElementById('progress');

const intro=document.getElementById('intro');

const stage=document.getElementById('stage');

const startBtn=document.getElementById('startBtn');

let current=-1;

/* =========================
   RENDER LINE
========================= */

function renderLine(text){

  line.innerHTML='';

  [...text].forEach(char=>{

    const span=document.createElement('span');

    span.className='char';

    span.innerHTML=
      char===' '
      ? '&nbsp;'
      : char;

    line.appendChild(span);
  });

  requestAnimationFrame(()=>{

    line.classList.add('active');

  });
}

/* =========================
   ILLUMINATE
========================= */

function illuminate(progressValue){

  const chars=document.querySelectorAll('.char');

  const total=chars.length;

  const lit=Math.floor(progressValue*total);

  chars.forEach((char,index)=>{

    if(index<lit){

      char.classList.add('on');

    }else{

      char.classList.remove('on');
    }
  });
}

/* =========================
   UPDATE LYRICS
========================= */

audio.addEventListener('timeupdate', ()=>{

  const t=audio.currentTime;

  /* progress */

  if(audio.duration){

    progress.style.width=
      (t/audio.duration)*100+'%';
  }

  let found=-1;

  for(let i=0;i<lyrics.length;i++){

    if(
      t>=lyrics[i].start &&
      t<=lyrics[i].end
    ){

      found=i;

      break;
    }
  }

  /* change line */

  if(found!==current){

    current=found;

    if(found>=0){

      line.classList.remove('active');

      setTimeout(()=>{

        renderLine(
          lyrics[found].text
        );

      },80);

      next.textContent=
        lyrics[found+1]
        ? lyrics[found+1].text
        : '';
    }
  }

  /* illuminate */

  if(found>=0){

    const item=lyrics[found];

    const progressValue=
      (t-item.start)/
      (item.end-item.start);

    illuminate(progressValue);
  }

});

/* =========================
   MUSIC NOTES
========================= */

const NOTES=['♪','♫','♩','♬'];

function spawnNote(){

  const note=document.createElement('div');

  note.className='note';

  note.textContent=
    NOTES[Math.floor(
      Math.random()*NOTES.length
    )];

  note.style.left=
    Math.random()*100+'%';

  note.style.top=
    (75+Math.random()*15)+'%';

  note.style.fontSize=
    (1+Math.random()*2)+'rem';

  document.body.appendChild(note);

  setTimeout(()=>{

    note.remove();

  },5000);
}

setInterval(spawnNote,1300);

/* =========================

========================= */

startBtn.addEventListener(
