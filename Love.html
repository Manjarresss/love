<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Heart Neon Flow</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}
canvas{
  display:block;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

const TEXT = "I love you";
const N = 220;
let offset = 0;

// inclinación del corazón
const ROTATION = -0.4;

// estrellas
const stars = Array.from({length:300},()=>({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight,
  r: Math.random()*1.5,
  speed: Math.random()*0.25 + 0.05
}));

// sharith flotantes
const shariths = Array.from({length:30},()=>({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight,
  speed: Math.random()*0.3 + 0.1
}));

function heart(t){
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: 13 * Math.cos(t)
       - 5 * Math.cos(2*t)
       - 2 * Math.cos(3*t)
       - Math.cos(4*t)
  };
}

function drawBackground(){
  // 🌌 degradado espacio
  let g = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 0,
    canvas.width/2, canvas.height/2, canvas.width
  );
  g.addColorStop(0,"#1a0a2a");
  g.addColorStop(0.5,"#090816");
  g.addColorStop(1,"#000");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // ✨ estrellas
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "#ffffff";
    ctx.shadowBlur = 8;
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();

    s.y += s.speed;
    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  });
}

function drawSharith(){
  ctx.font = "18px Courier New";
  ctx.fillStyle = "#ff6ec7";

  shariths.forEach(s=>{
    ctx.globalAlpha = 0.6;

    // ✨ glow
    ctx.shadowColor = "#ff6ec7";
    ctx.shadowBlur = 15;

    ctx.fillText("sharith", s.x, s.y);

    s.y += s.speed;
    if(s.y > canvas.height){
      s.y = 0;
      s.x = Math.random()*canvas.width;
    }
  });

  ctx.globalAlpha = 1;
}

function drawHeart(){
  const cx = canvas.width/2;
  const cy = canvas.height/2;
  const scale = Math.min(canvas.width, canvas.height) * 0.02;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ROTATION);

  ctx.font = "18px Courier New";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for(let i=0;i<N;i++){
    let t = (i / N) * Math.PI * 2 + offset;
    let p = heart(t);

    let x = p.x * scale;
    let y = -p.y * scale;

    // 💖 efecto neón
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = "#ffb6e6";
    ctx.shadowColor = "#ff6ec7";
    ctx.shadowBlur = 20;

    ctx.fillText(TEXT, x, y);
  }

  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackground();
  drawSharith();
  drawHeart();

  // 🐢 velocidad ULTRA lenta
  offset += 0.0006;

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
